# TEMPORARY diagnostic — isolates whether the 401 comes from the token/store pair
# or from the Shopify CLI. Prints only HTTP status codes and CLI output (GitHub
# masks the secret in logs). Delete this file once the token issue is resolved.

name: Debug theme token (temporary)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
      SHOPIFY_FLAG_STORE: ${{ vars.SHOPIFY_STORE }}
    steps:
      - name: Token shape (no secret revealed)
        run: |
          echo "token length: ${#SHOPIFY_CLI_THEME_TOKEN}"
          echo "store: $SHOPIFY_FLAG_STORE"

      - name: "Test 1: raw REST call via Theme Access proxy"
        run: |
          STATUS=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            "https://theme-kit-access.shopifyapps.com/cli/admin/api/2024-07/themes.json" \
            -H "X-Shopify-Access-Token: ${SHOPIFY_CLI_THEME_TOKEN}" \
            -H "X-Shopify-Shop: ${SHOPIFY_FLAG_STORE}")
          echo "proxy themes.json HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "TOKEN IS VALID for this store — problem is in the CLI layer."
            head -c 300 /tmp/resp.json; echo
          else
            echo "Token/store pair rejected by Shopify's Theme Access proxy:"
            cat /tmp/resp.json; echo
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "Test 2: shopify theme list with @shopify/cli@latest"
        continue-on-error: true
        run: |
          npm install -g @shopify/cli@latest
          shopify version
          shopify theme list

      - name: "Test 3: shopify theme list with @shopify/cli@3"
        continue-on-error: true
        run: |
          npm install -g @shopify/cli@3 @shopify/theme@3
          shopify version
          shopify theme list
