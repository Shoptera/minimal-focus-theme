# TEMPORARY diagnostic — verifies Shopify auth end to end without deploying.
# Resolves a token (client credentials preferred, static fallback) and runs
# `shopify theme list`. Prints only statuses/errors, never credentials.
# Delete this file once auth is confirmed working.

name: Debug Shopify auth (temporary)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Shopify token
        id: auth
        uses: ./.github/actions/shopify-auth
        with:
          store: ${{ vars.SHOPIFY_STORE }}
          client_id: ${{ secrets.SHOPIFY_CLIENT_ID }}
          client_secret: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          static_token: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: shopify theme list with resolved token
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ steps.auth.outputs.token }}
          SHOPIFY_FLAG_STORE: ${{ vars.SHOPIFY_STORE }}
          SHOPIFY_FLAG_FORCE: 1
        run: |
          npm install -g @shopify/cli@latest
          shopify version
          shopify theme list
          echo "AUTH VERIFIED — deploys will work."
