# Reusable deploy workflow — pushes a git ref to a specific Shopify theme.
#
# Auth (resolved by .github/actions/shopify-auth):
#   preferred — SHOPIFY_CLIENT_ID + SHOPIFY_CLIENT_SECRET secrets (Dev Dashboard
#               app; exchanged for a fresh 24h Admin token every run)
#   fallback  — SHOPIFY_CLI_THEME_TOKEN secret (Theme Access password)
#
# protect_content: true  → content JSON (templates/*.json, config/settings_data.json,
#                          sections/*.json) is NOT pushed, so changes made by
#                          admins in the theme editor are never overwritten.
# allow_live:      true  → required only when the target theme is the store's
#                          published (live) theme.
#
# Always pushes with --nodelete: CI never deletes remote files. Removing a file
# from a theme is a deliberate manual step (see docs/WORKFLOW.md).

name: Deploy theme (reusable)

on:
  workflow_call:
    inputs:
      theme_id:
        description: Shopify theme ID to push to
        required: true
        type: string
      ref:
        description: Git ref to deploy
        required: true
        type: string
      protect_content:
        description: Skip content JSON so theme-editor changes are preserved
        required: false
        type: boolean
        default: true
      allow_live:
        description: Allow pushing to the published theme
        required: false
        type: boolean
        default: false
    secrets:
      SHOPIFY_CLIENT_ID:
        required: false
      SHOPIFY_CLIENT_SECRET:
        required: false
      SHOPIFY_CLI_THEME_TOKEN:
        required: false

concurrency:
  group: deploy-theme-${{ inputs.theme_id }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ${{ inputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Resolve Shopify token
        id: auth
        uses: ./.github/actions/shopify-auth
        with:
          store: ${{ vars.SHOPIFY_STORE }}
          client_id: ${{ secrets.SHOPIFY_CLIENT_ID }}
          client_secret: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          static_token: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push theme ${{ inputs.theme_id }}
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ steps.auth.outputs.token }}
          SHOPIFY_FLAG_STORE: ${{ vars.SHOPIFY_STORE }}
          SHOPIFY_FLAG_FORCE: 1
        run: |
          set -euo pipefail
          FLAGS=(--theme "${{ inputs.theme_id }}" --nodelete --json)
          if [ "${{ inputs.protect_content }}" = "true" ]; then
            FLAGS+=(
              --ignore "config/settings_data.json"
              --ignore "templates/*.json"
              --ignore "templates/customers/*.json"
              --ignore "templates/metaobject/*.json"
              --ignore "sections/*.json"
            )
          fi
          if [ "${{ inputs.allow_live }}" = "true" ]; then
            FLAGS+=(--allow-live)
          fi
          shopify theme push "${FLAGS[@]}"
